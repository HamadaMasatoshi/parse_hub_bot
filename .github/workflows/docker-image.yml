name: Docker Image CI

on:
  push:
    branches: [ main ]      # ✨ 自动触发：只要你 push 代码到 main 分支，就自动触发编译
                            # 💡 如果你的默认分支叫 master，请把上面改成 [ master ]
  workflow_dispatch:        # ✨ 手动触发：在 GitHub 网页端点击按钮，即可随时随地触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # 必须赋予写入 Package 的权限
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 登录到 GHCR 镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 自动生成的临时令牌

      - name: 构建并推送镜像
        run: |
          # 动态获取你自己的 GitHub 用户名和项目名，并转换为纯小写（因为 GHCR 强制要求镜像名全小写）
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          echo "🚀 目标镜像地址: ghcr.io/$OWNER/$REPO:latest"
          
          # 1. 编译 Docker 镜像
          docker build . --file Dockerfile --tag ghcr.io/$OWNER/$REPO:latest
          
          # 2. 推送到你自己的 GHCR 仓库
          docker push ghcr.io/$OWNER/$REPO:latest
          
          echo "✅ 镜像推送成功！"
