services:
  parse_hub_bot:
    image: ghcr.io/你的GitHub用户名/parse_hub_bot:latest
    container_name: parse_hub_bot
    restart: always
    
    # 1. 所有的密钥、Token 直接写在这里
    environment:
      - BOT_TOKEN=你的_TELEGRAM_BOT_TOKEN
      - API_ID=你的_TELEGRAM_API_ID
      - API_HASH=你的_TELEGRAM_API_HASH
      # 如果服务器需要走本地代理，可以取消下行注释并修改
      # - BOT_PROXY=socks5://127.0.0.1:1080
      
    # 2. 使用你习惯的绝对路径进行挂载
    volumes:
      - /opt/parse_hub_bot/sessions:/app/sessions
      - /opt/parse_hub_bot/downloads:/app/downloads

    # 3. 将下方定义的内联推特 Cookie 动态注入容器
    configs:
      - source: inline_platform_config
        # ⚠️ 注意：冒号右边的 `/app/...` 是容器内部路径，取决于原作者 Dockerfile 里的 WORKDIR。
        # 如果原作者写的是 WORKDIR /app，这里保持 /app 即可；
        # 如果原作者写的是 WORKDIR /opt/parse_hub_bot，请将此处改为 /opt/parse_hub_bot/data/config/platform_config.yaml
        target: /app/data/config/platform_config.yaml

# 4. 彻底替代原仓库里的 platform_config.yaml 模板文件
configs:
  inline_platform_config:
    content: |
      twitter:
        auth_token: "你的推特_auth_token"
        ct0: "你的推特_ct0"
